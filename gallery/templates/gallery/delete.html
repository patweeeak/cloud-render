<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete {{ photo.title }}</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f8f9fa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .warning-card { background: white; padding: 3rem; border-radius: 12px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); text-align: center; max-width: 500px; border-top: 5px solid #ff6b6b; }
        .btn-danger { background: #ff6b6b; color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 6px; font-size: 1rem; cursor: pointer; text-decoration: none; display: inline-block; }
        .btn-cancel { background: #eee; color: #333; border: none; padding: 0.75rem 1.5rem; border-radius: 6px; font-size: 1rem; cursor: pointer; text-decoration: none; display: inline-block; margin-left: 10px; }
    </style>
</head>
<body>

    <div class="warning-card">
        <h2 style="margin-top: 0; color: #333;">Are you absolutely sure?</h2>
        <p style="color: #666; font-size: 1.1rem; margin-bottom: 2rem;">
            You are about to permanently delete <strong>"{{ photo.title }}"</strong>. This will also remove the image from your Cloudinary storage. This action cannot be undone.
        </p>
        
        <form method="POST">
            {% csrf_token %}
            <button type="submit" class="btn-danger">Yes, Delete It</button>
            <a href="{% url 'gallery_home' %}" class="btn-cancel">Cancel</a>
        </form>
    </div>

</body>
</html>
